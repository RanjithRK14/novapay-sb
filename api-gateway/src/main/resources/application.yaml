server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  # ✅ Redis config for rate limiting
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 1s

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:

        # USER SERVICE — public, no rate limit needed
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # WALLET SERVICE — no rate limit (internal calls from transaction-service)
        - id: wallet-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/wallets/**

        # TRANSACTION SERVICE — rate limited: 10 req/s per user, burst up to 20
        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/transactions/**,/api/transaction/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # REWARD SERVICE — rate limited: 10 req/s per user, burst up to 20
        - id: reward-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/rewards/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # NOTIFICATION SERVICE — rate limited: 10 req/s per user, burst up to 20
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG