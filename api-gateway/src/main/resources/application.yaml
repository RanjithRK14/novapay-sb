server:
  port: ${SERVER_PORT:10000}

spring:
  application:
    name: api-gateway-service

  # Redis removed — it caused 429 Too Many Requests by auto-applying
  # rate limiting that burned through Upstash free-tier quota (10k/day).
  # Rate limiting is not needed for this project right now.

  cloud:
    gateway:
      # 90s timeout handles Render free-tier cold starts (up to 50s)
      httpclient:
        connect-timeout: 10000
        response-timeout: 90s

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - ${FRONTEND_URL:https://novapay-app.netlify.app}
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # ── Auth & User ────────────────────────────────────────────────
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        - id: user-service-api
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**

        # ── Wallet ─────────────────────────────────────────────────────
        - id: wallet-service
          uri: ${WALLET_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/wallets/**

        # ── Transactions ───────────────────────────────────────────────
        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/transactions/**

        # ── Rewards ────────────────────────────────────────────────────
        - id: reward-service
          uri: ${REWARD_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/rewards/**

        # ── Notifications ──────────────────────────────────────────────
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notify/**

        # ── Keep-alive ping routes (rewrite /ping/X → /ping on each service) ──
        - id: user-service-ping
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/ping/user
          filters:
            - RewritePath=/ping/user, /ping

        - id: wallet-service-ping
          uri: ${WALLET_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/ping/wallet
          filters:
            - RewritePath=/ping/wallet, /ping

        - id: transaction-service-ping
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/ping/transaction
          filters:
            - RewritePath=/ping/transaction, /ping

        - id: reward-service-ping
          uri: ${REWARD_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/ping/reward
          filters:
            - RewritePath=/ping/reward, /ping

        - id: notification-service-ping
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/ping/notification
          filters:
            - RewritePath=/ping/notification, /ping

logging:
  level:
    org.springframework.cloud.gateway: INFO
